services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    restart: unless-stopped
    container_name: speedtest-tracker
    ports:
      - 8110:80
      - 8111:443
    environment:
      - PUID=1000
      - PGID=1000
      - APP_KEY=base64:uzwsG4R92a2FC5Aoa1OQZgN3abhL9Ob5EWRrGRPOGBg=
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=0 * * * *
    volumes:
      - /home/michondr/_michondr/speedtest-tracker-data/data:/config
      - /home/michondr/_michondr/speedtest-tracker-data/ssl-keys:/config/keys